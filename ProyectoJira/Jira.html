<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Jira Style Task Manager</title>
</head>

<body>
    <div class="jira-card">
        <h3>Backlog de Desarrollo</h3>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Añadir una tarea...">
            <button id="addBtn" class="btn-add">Crear</button>
        </div>
        <ul id="taskList" class="task-list"></ul>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
